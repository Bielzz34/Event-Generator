<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <h1>🌍 Power Nations 1 Event Generator</h1>

<div class="section">
    <h2>General</h2>

    <input id="name" placeholder="Event Name">
    <br><br>

    <textarea id="description" placeholder="Description"></textarea>
</div>

<div class="section">
    <h2>Conditions</h2>

    <div id="conditions"></div>

    <button onclick="addCondition()">➕ Add Condition</button>
    <button onclick="removeCondition()">➖ Remove Condition</button>
</div>

<div class="section">
    <h2>Choices</h2>

    <div id="choices"></div>

    <button onclick="addChoice()">➕ Add Choice</button>
    <button onclick="removeChoice()">➖ Remove Choice</button>
</div>

<div class="section">
    <button onclick="generate()">⚡ Generate Event</button>
    <button onclick="copyLua(event)">📋 Copy Lua</button>
    <button onclick="exportLua()">📥 Export Lua</button>
    <button onclick="clearAll()">🗑 Clear All</button>
</div>

<pre id="output"></pre>
    <script  src="./script.js"></script>

  </body>
  
</html>
